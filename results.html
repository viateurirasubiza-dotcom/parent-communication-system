<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Results Management</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f1f5f9;
padding:20px;
}

.container{
max-width:1200px;
margin:auto;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.header h1{
color:#0f172a;
}

.back-btn{
background:#3b82f6;
color:white;
padding:10px 15px;
text-decoration:none;
border-radius:8px;
}

.card{
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 2px 10px rgba(0,0,0,.1);
margin-bottom:20px;
}

.form-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
}

input{
padding:10px;
border:1px solid #ccc;
border-radius:8px;
width:100%;
}

.btn{
background:#22c55e;
color:white;
border:none;
padding:10px;
border-radius:8px;
cursor:pointer;
}

table{
width:100%;
border-collapse:collapse;
}

table th,
table td{
padding:12px;
border-bottom:1px solid #ddd;
text-align:left;
}

table th{
background:#e2e8f0;
}

.total{
font-weight:bold;
color:#0f172a;
}

.delete-btn{
background:#ef4444;
color:white;
border:none;
padding:6px 10px;
border-radius:5px;
cursor:pointer;
}

</style>
</head>
<body>

<div class="container">

<div class="header">
<h1>Results Management</h1>

<a href="dashboard.html" class="back-btn">
<i class="fas fa-arrow-left"></i> Dashboard
</a>
</div>

<div class="card">

<h2>Add Results</h2>
<br>

<div class="form-grid">

<input type="text" id="studentId" placeholder="Student ID">

<input type="text" id="studentName" placeholder="Student Name">

<input type="text" id="subject" placeholder="Subject">

<input type="number" id="cat" placeholder="CAT Marks">

<input type="number" id="exam" placeholder="Exam Marks">

<button class="btn" onclick="addResult()">
Save Result
</button>

</div>

</div>

<div class="card">

<h2>Results List</h2>
<br>

<table>

<thead>
<tr>
<th>ID</th>
<th>Name</th>
<th>Subject</th>
<th>CAT</th>
<th>Exam</th>
<th>Total</th>
<th>Action</th>
</tr>
</thead>

<tbody id="resultsTable">

</tbody>

</table>

</div>

</div>

<script>

let results =
JSON.parse(localStorage.getItem("results")) || [];

function saveResults(){
localStorage.setItem(
"results",
JSON.stringify(results)
);
}

function addResult(){

const id =
document.getElementById("studentId").value;

const name =
document.getElementById("studentName").value;

const subject =
document.getElementById("subject").value;

const cat =
parseFloat(document.getElementById("cat").value);

const exam =
parseFloat(document.getElementById("exam").value);

if(!id || !name || !subject || isNaN(cat) || isNaN(exam)){
alert("Fill all fields correctly");
return;
}

const total = cat + exam;

results.push({
id,
name,
subject,
cat,
exam,
total
});

saveResults();
renderResults();

document.getElementById("studentId").value="";
document.getElementById("studentName").value="";
document.getElementById("subject").value="";
document.getElementById("cat").value="";
document.getElementById("exam").value="";

alert("Result Saved");

}

function renderResults(){

const table =
document.getElementById("resultsTable");

table.innerHTML="";

results.forEach((r,index)=>{

table.innerHTML += `
<tr>
<td>${r.id}</td>
<td>${r.name}</td>
<td>${r.subject}</td>
<td>${r.cat}</td>
<td>${r.exam}</td>
<td class="total">${r.total}</td>
<td>
<button class="delete-btn"
onclick="deleteResult(${index})">
Delete
</button>
</td>
</tr>
`;

});

}

function deleteResult(index){

if(confirm("Delete this result?")){

results.splice(index,1);

saveResults();

renderResults();

}

}

renderResults();

</script>

</body>
</html>
