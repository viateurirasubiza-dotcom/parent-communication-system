<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finance Management - Firebase</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
display:flex;
background:#f1f5f9;
}

/* SIDEBAR */
.sidebar{
width:240px;
height:100vh;
background:#0f172a;
color:white;
position:fixed;
padding:20px;
}

.sidebar a{
display:block;
color:white;
padding:12px;
text-decoration:none;
border-radius:8px;
margin-top:5px;
}

.sidebar a:hover{
background:#1e293b;
}

/* MAIN */
.main{
margin-left:240px;
padding:20px;
width:100%;
}

/* CARDS */
.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
margin-bottom:20px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

/* FORM */
.form{
background:white;
padding:20px;
border-radius:10px;
margin-bottom:20px;
}

input{
padding:10px;
margin:5px;
width:23%;
border:1px solid #ccc;
border-radius:8px;
}

button{
padding:10px 15px;
border:none;
border-radius:8px;
cursor:pointer;
background:#22c55e;
color:white;
}

.search{
width:100%;
margin-bottom:10px;
}

/* TABLE */
table{
width:100%;
background:white;
border-collapse:collapse;
border-radius:10px;
overflow:hidden;
}

th,td{
padding:12px;
border-bottom:1px solid #eee;
text-align:left;
}

th{
background:#e2e8f0;
}

.delete{
background:red;
color:white;
padding:6px 10px;
border:none;
border-radius:6px;
cursor:pointer;
}

.paid{
color:green;
font-weight:bold;
}

</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
<h2>💰 Finance</h2>

<a href="dashboard.html">Dashboard</a>
<a href="students.html">Students</a>
<a href="parents.html">Parents</a>
<a href="attendance.html">Attendance</a>
<a href="results.html">Results</a>
</div>

<!-- MAIN -->
<div class="main">

<h2>Finance Management (Firebase)</h2>

<!-- CARDS -->
<div class="cards">
<div class="card">
<h3>Total Paid</h3>
<h2 id="totalPaid">0</h2>
</div>

<div class="card">
<h3>Total Records</h3>
<h2 id="totalRecords">0</h2>
</div>

<div class="card">
<h3>Balance</h3>
<h2 id="balance">0</h2>
</div>
</div>

<!-- FORM -->
<div class="form">

<input id="student" placeholder="Student Name">
<input id="amount" type="number" placeholder="Amount">
<input id="date" type="date">
<input id="class" placeholder="Class">

<button onclick="addPayment()">Add Payment</button>

<input class="search" id="search" onkeyup="render()" placeholder="Search student...">

</div>

<!-- TABLE -->
<table>
<thead>
<tr>
<th>Student</th>
<th>Class</th>
<th>Amount</th>
<th>Date</th>
<th>Receipt</th>
<th>Action</th>
</tr>
</thead>

<tbody id="table"></tbody>
</table>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
getFirestore,
collection,
addDoc,
getDocs,
deleteDoc,
doc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

/* 🔥 YOUR FIREBASE CONFIG */
const firebaseConfig = {
apiKey: "AIzaSyAXbc--d4T0Qk3zj5eewDRQbN3pn9_KQ-Q",
authDomain: "parent-communication-system.firebaseapp.com",
projectId: "parent-communication-system",
storageBucket: "parent-communication-system.appspot.com",
messagingSenderId: "277714611613",
appId: "1:277714611613:web:a9ff3b59ce5899c27f1374"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const paymentsRef = collection(db,"payments");

let payments = [];

/* ADD PAYMENT */
window.addPayment = async function(){

let student = document.getElementById("student").value;
let amount = document.getElementById("amount").value;
let date = document.getElementById("date").value;
let cls = document.getElementById("class").value;

if(!student || !amount || !date || !cls){
alert("Fill all fields");
return;
}

await addDoc(paymentsRef,{
student,
amount:parseInt(amount),
date,
class:cls,
receipt:"REC-"+Date.now()
});

alert("Saved to Firebase");
loadData();
}

/* LOAD DATA */
async function loadData(){

payments = [];

let snap = await getDocs(paymentsRef);

snap.forEach(d=>{
payments.push({id:d.id,...d.data()});
});

render();
}

/* DELETE */
window.deletePayment = async function(id){
await deleteDoc(doc(db,"payments",id));
loadData();
}

/* RENDER */
window.render = function(){

let search = document.getElementById("search").value.toLowerCase();

let table = document.getElementById("table");
table.innerHTML="";

let total = 0;

let filtered = payments.filter(p =>
p.student.toLowerCase().includes(search)
);

filtered.forEach(p=>{
total += p.amount;

table.innerHTML += `
<tr>
<td>${p.student}</td>
<td>${p.class}</td>
<td>${p.amount}</td>
<td>${p.date}</td>
<td>${p.receipt}</td>
<td>
<button class="delete" onclick="deletePayment('${p.id}')">Delete</button>
</td>
</tr>
`;
});

document.getElementById("totalPaid").innerText = total;
document.getElementById("totalRecords").innerText = payments.length;
document.getElementById("balance").innerText = 500000 - total;
}

/* INIT */
loadData();

</script>

</body>
</html>
