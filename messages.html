<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Messages - Parent Communication System</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0f172a;
display:flex;
height:100vh;
}

/* SIDEBAR */
.sidebar{
width:250px;
background:#111827;
color:white;
padding:20px;
}

.sidebar h2{
margin-bottom:20px;
}

.sidebar a{
display:block;
color:white;
text-decoration:none;
padding:10px;
border-radius:8px;
margin-bottom:5px;
}

.sidebar a:hover{
background:#1f2937;
}

/* MAIN */
.main{
flex:1;
display:flex;
flex-direction:column;
}

/* TOPBAR */
.topbar{
background:#1e293b;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

/* CHAT AREA */
.chat-container{
flex:1;
padding:20px;
overflow-y:auto;
background:#0b1220;
}

.message{
max-width:60%;
padding:12px;
margin-bottom:10px;
border-radius:12px;
position:relative;
}

.sent{
background:#22c55e;
color:white;
margin-left:auto;
border-bottom-right-radius:0;
}

.received{
background:#334155;
color:white;
margin-right:auto;
border-bottom-left-radius:0;
}

.role{
font-size:11px;
opacity:0.7;
margin-top:5px;
}

/* INPUT AREA */
.input-area{
display:flex;
padding:15px;
background:#1e293b;
gap:10px;
}

input,select{
padding:10px;
border:none;
border-radius:8px;
outline:none;
}

input{
flex:1;
}

button{
background:#22c55e;
border:none;
color:white;
padding:10px 15px;
border-radius:8px;
cursor:pointer;
}

/* TITLE */
.title{
color:white;
font-size:18px;
}

</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">

<h2>📩 Messages</h2>

<a href="dashboard.html">Dashboard</a>
<a href="students.html">Students</a>
<a href="parents.html">Parents</a>
<a href="attendance.html">Attendance</a>
<a href="results.html">Results</a>
<a href="finance.html">Finance</a>

</div>

<!-- MAIN -->
<div class="main">

<div class="topbar">
<div class="title">School Communication Center</div>
<div>Admin Panel</div>
</div>

<!-- CHAT -->
<div class="chat-container" id="chatBox"></div>

<!-- INPUT -->
<div class="input-area">

<select id="role">
<option value="Admin">Admin</option>
<option value="Teacher">Teacher</option>
<option value="Parent">Parent</option>
</select>

<input type="text" id="message" placeholder="Type message...">

<button onclick="sendMessage()">
<i class="fa fa-paper-plane"></i>
</button>

</div>

</div>

<script>

let messages = JSON.parse(localStorage.getItem("messages")) || [];

function save(){
localStorage.setItem("messages", JSON.stringify(messages));
}

function sendMessage(){

let msg = document.getElementById("message").value;
let role = document.getElementById("role").value;

if(!msg){
alert("Type a message");
return;
}

messages.push({
text:msg,
role:role,
time:new Date().toLocaleString(),
type:"sent"
});

save();
render();

document.getElementById("message").value="";

}

function render(){

let box = document.getElementById("chatBox");
box.innerHTML="";

messages.forEach(m=>{

box.innerHTML += `
<div class="message ${m.type}">
${m.text}
<div class="role">${m.role} • ${m.time}</div>
</div>
`;

});

box.scrollTop = box.scrollHeight;

}

render();

</script>

</body>
</html>
